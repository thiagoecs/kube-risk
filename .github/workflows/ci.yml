name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build kube-risk
        run: go build -o kube-risk .

      - name: Install kind
        run: |
          curl -sSLo kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          chmod +x kind && sudo mv kind /usr/local/bin/kind

      - name: Create cluster
        run: kind create cluster --name kube-risk-test

      - name: Deploy broken workloads
        run: kubectl apply -f test-cluster/broken-workloads.yaml

      - name: Verify analyze finds expected findings
        # Exits 1 when HIGH findings are found — that's expected, so we allow failure.
        run: ./kube-risk analyze -n risky-apps || true

      - name: Verify pr --dry-run produces correct output
        run: |
          output=$(./kube-risk pr \
            --repo thiagoecs/kube-risk-sample-app \
            --path-template "manifests/{namespace}/{name}.yaml" \
            -n risky-apps \
            --dry-run 2>&1)
          echo "$output"
          # Assert that at least one PR would be opened
          echo "$output" | grep -q "PR(s) would be opened"

      - name: Tear down cluster
        if: always()
        run: kind delete cluster --name kube-risk-test
