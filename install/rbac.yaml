# kube-risk read-only service account
#
# This creates the minimum permissions kube-risk needs to scan your cluster:
#   - list deployments              (single-replica, missing-pdb, unsafe-rollout, missing-readiness-probe, missing-liveness-probe, missing-resources, latest-image-tag)
#   - list statefulsets             (single-replica, missing-pdb, risky-statefulset, missing-readiness-probe, missing-liveness-probe, missing-resources, latest-image-tag)
#   - list daemonsets               (missing-resources, missing-liveness-probe, latest-image-tag, daemonset-update-strategy)
#   - list poddisruptionbudgets     (missing-pdb)
#   - list horizontalpodautoscalers (hpa-min-replicas)
#
# kube-risk NEVER modifies the cluster. All fixes are applied via GitHub PRs.
#
# Usage:
#   kubectl apply -f https://github.com/thiagoecs/kube-risk/releases/download/v0.5.0/rbac.yaml
#   kubectl get secret kube-risk-token -n kube-risk -o jsonpath='{.data.kubeconfig}' | base64 -d
#   # Paste the output as the KUBECONFIG secret in your GitHub repo settings.

---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-risk

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-risk
  namespace: kube-risk

---
# Long-lived token for use as a GitHub Actions secret.
# Kubernetes 1.24+ no longer auto-creates tokens for service accounts,
# so we create one explicitly.
apiVersion: v1
kind: Secret
metadata:
  name: kube-risk-token
  namespace: kube-risk
  annotations:
    kubernetes.io/service-account.name: kube-risk
type: kubernetes.io/service-account-token

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-risk
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-risk
subjects:
  - kind: ServiceAccount
    name: kube-risk
    namespace: kube-risk
roleRef:
  kind: ClusterRole
  name: kube-risk
  apiGroup: rbac.authorization.k8s.io
