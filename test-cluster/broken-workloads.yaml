# ============================================================
# kube-risk test workloads — intentionally broken configurations
# Each workload is designed to trigger one or more V1 rules.
# ============================================================

# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: risky-apps

---
# ── 1. Triggers: single-replica + missing-pdb + missing-readiness-probe ──
# A typical "just works in dev" deployment that someone forgot to harden.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-resilience
  namespace: risky-apps
spec:
  replicas: 1          # single replica = HIGH
  selector:
    matchLabels:
      app: no-resilience
  template:
    metadata:
      labels:
        app: no-resilience
    spec:
      containers:
        - name: app
          image: nginx:stable
          ports:
            - containerPort: 80
          # No readinessProbe = HIGH

---
# ── 2. Triggers: unsafe-rollout (maxUnavailable=100%) ────────
# unsafe-rollout is suppressed here to demonstrate the annotation.
# In a real scenario a team might accept this risk for a batch job
# that deploys infrequently and can tolerate brief downtime.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-rollout
  namespace: risky-apps
  annotations:
    kube-risk/suppress: "unsafe-rollout"
    kube-risk/suppress-reason: "batch job — brief downtime during deploys is acceptable"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: bad-rollout
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 3    # 75% of 4 = very dangerous
      maxSurge: 0
  template:
    metadata:
      labels:
        app: bad-rollout
    spec:
      containers:
        - name: app
          image: nginx:stable
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

---
# ── 3. Triggers: risky-statefulset (OnDelete strategy) ───────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: on-delete-db
  namespace: risky-apps
spec:
  replicas: 2
  serviceName: on-delete-db
  selector:
    matchLabels:
      app: on-delete-db
  updateStrategy:
    type: OnDelete    # HIGH — changes won't roll out automatically
  template:
    metadata:
      labels:
        app: on-delete-db
    spec:
      containers:
        - name: db
          image: nginx:stable
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ── 4. Triggers: risky-statefulset (Parallel) + single-replica ──
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: parallel-statefulset
  namespace: risky-apps
spec:
  replicas: 1           # single replica = HIGH
  serviceName: parallel-statefulset
  podManagementPolicy: Parallel   # MEDIUM
  selector:
    matchLabels:
      app: parallel-statefulset
  template:
    metadata:
      labels:
        app: parallel-statefulset
    spec:
      containers:
        - name: app
          image: nginx:stable

---
# ── 5. Triggers: daemonset-update-strategy (OnDelete) ────────
# A node agent (e.g. log shipper) that will never auto-update.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: risky-apps
spec:
  selector:
    matchLabels:
      app: node-agent
  updateStrategy:
    type: OnDelete   # MEDIUM — pods must be deleted manually to pick up updates
  template:
    metadata:
      labels:
        app: node-agent
    spec:
      containers:
        - name: agent
          image: nginx:stable
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

---
# ── 6. Triggers: latest-image-tag + missing-resources + missing-liveness-probe ──
# A typical "I'll fix it later" deployment with multiple hygiene issues.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: untagged-app
  namespace: risky-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: untagged-app
  template:
    metadata:
      labels:
        app: untagged-app
    spec:
      containers:
        - name: app
          image: nginx:latest   # MEDIUM — non-deterministic, impossible to roll back
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          # No resources  → MEDIUM (missing-resources)
          # No livenessProbe → HIGH  (missing-liveness-probe)

---
# ── 7. Triggers: hpa-min-replicas (minReplicas=1) ────────────
# An HPA that silently defeats the replica protection on scaler-target.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaler-target
  namespace: risky-apps
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scaler-target
  template:
    metadata:
      labels:
        app: scaler-target
    spec:
      containers:
        - name: app
          image: nginx:stable
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scaler-target-hpa
  namespace: risky-apps
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scaler-target
  minReplicas: 1    # HIGH — can scale to 1 during quiet periods, defeating any PDB
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50

---
# ── 8. A "good" deployment — should produce ZERO findings ────
# Passes all 10 rules: replicas, probes, rollout, PDB, resources, pinned image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: well-configured
  namespace: risky-apps
spec:
  replicas: 3
  selector:
    matchLabels:
      app: well-configured
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: well-configured
    spec:
      containers:
        - name: app
          image: nginx:stable
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: well-configured-pdb
  namespace: risky-apps
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: well-configured
