name: kube-risk
description: Analyze Kubernetes cluster for upgrade risks and open GitHub PRs with YAML fixes
author: thiagoecs

branding:
  icon: shield
  color: red

inputs:
  kubeconfig:
    description: "Contents of your kubeconfig file (store as a GitHub secret)"
    required: true
  mode:
    description: "'pr' — open PRs/Issues for findings (default). 'analyze' — CI gate: fail the job if HIGH findings exist."
    required: false
    default: pr
  github-token:
    description: "GitHub token with contents:write and pull-requests:write permissions (required for mode: pr)"
    required: false
    default: ''
  repo:
    description: "Repository containing the manifests, e.g. owner/repo (required for mode: pr)"
    required: false
    default: ''
  path-template:
    description: "Path template to locate manifests, e.g. manifests/{namespace}/{name}.yaml (optional — auto-discovered if omitted)"
    required: false
    default: ''
  namespace:
    description: "Kubernetes namespace to scan (default: all namespaces)"
    required: false
    default: ''
  environment:
    description: "Environment type: production (all rules) or development (skips scale rules)"
    required: false
    default: production
  version:
    description: "kube-risk release version to use"
    required: false
    default: v0.8.0

runs:
  using: composite
  steps:
    - name: Download kube-risk
      shell: bash
      run: |
        curl -sSL \
          "https://github.com/thiagoecs/kube-risk/releases/download/${{ inputs.version }}/kube-risk-linux-amd64" \
          -o /usr/local/bin/kube-risk
        chmod +x /usr/local/bin/kube-risk

    - name: Write kubeconfig
      shell: bash
      env:
        KUBECONFIG_CONTENT: ${{ inputs.kubeconfig }}
      run: |
        mkdir -p "$HOME/.kube"
        printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
        chmod 600 "$HOME/.kube/config"

    - name: Run kube-risk analyze (CI gate)
      if: inputs.mode == 'analyze'
      shell: bash
      run: |
        args=(analyze -e "${{ inputs.environment }}")
        if [[ -n "${{ inputs.namespace }}" ]]; then
          args+=(-n "${{ inputs.namespace }}")
        fi
        kube-risk "${args[@]}"

    - name: Run kube-risk pr (open fixes)
      if: inputs.mode == 'pr' || inputs.mode == ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        args=(pr
          --repo "${{ inputs.repo }}"
          -e "${{ inputs.environment }}"
        )
        if [[ -n "${{ inputs.path-template }}" ]]; then
          args+=(--path-template "${{ inputs.path-template }}")
        fi
        if [[ -n "${{ inputs.namespace }}" ]]; then
          args+=(-n "${{ inputs.namespace }}")
        fi
        kube-risk "${args[@]}"
